<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2740"/>
      <stop offset="50%" stop-color="#143d59"/>
      <stop offset="100%" stop-color="#1b5b73"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123551"/>
      <stop offset="100%" stop-color="#0c2437"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#061119" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#70d5ff" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <g opacity="0.15" stroke="#70d5ff" stroke-width="2" fill="none">
    <path d="M 120 220 Q 560 180 930 240 Q 1330 300 1790 230"/>
    <path d="M 140 860 Q 620 800 980 850 Q 1400 905 1770 830"/>
    <path d="M 290 120 Q 260 540 300 960"/>
    <path d="M 1610 120 Q 1650 540 1610 960"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="150" y="160" width="1620" height="760" rx="34" fill="url(#panel)" stroke="#70d5ff" stroke-opacity="0.45" stroke-width="2"/>
  </g>

  <g transform="translate(240, 260)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="34" letter-spacing="4" fill="#81d9ff" opacity="0.95">ARCHITECTURE BREAKDOWN</text>
    <text x="0" y="120" font-family="Arial, sans-serif" font-size="88" font-weight="bold" fill="#e7f7ff">OPC-Starter</text>
    <text x="0" y="220" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#e7f7ff">A2UI · Functions · Agent Studio</text>
    <text x="0" y="300" font-family="Arial, sans-serif" font-size="28" fill="#a9dff5">从渲染链路到 Edge Functions，拆解一个 AI-first SaaS 底座</text>
  </g>

  <g transform="translate(250, 560)" filter="url(#shadow)">
    <rect x="0" y="0" width="330" height="210" rx="18" fill="#123f5d" stroke="#81d9ff" stroke-opacity="0.5" stroke-width="2"/>
    <text x="30" y="48" font-family="Arial" font-size="24" font-weight="bold" fill="#f4fbff">A2UI</text>
    <text x="30" y="88" font-family="monospace" font-size="18" fill="#9fe8ff">message -&gt; surface</text>
    <text x="30" y="122" font-family="monospace" font-size="18" fill="#9fe8ff">dataModel binding</text>
    <text x="30" y="156" font-family="monospace" font-size="18" fill="#9fe8ff">registry rendering</text>
  </g>

  <g transform="translate(620, 560)" filter="url(#shadow)">
    <rect x="0" y="0" width="330" height="210" rx="18" fill="#15324c" stroke="#81d9ff" stroke-opacity="0.5" stroke-width="2"/>
    <text x="30" y="48" font-family="Arial" font-size="24" font-weight="bold" fill="#f4fbff">Functions</text>
    <text x="30" y="88" font-family="monospace" font-size="18" fill="#9fe8ff">SSE gateway</text>
    <text x="30" y="122" font-family="monospace" font-size="18" fill="#9fe8ff">agent loop</text>
    <text x="30" y="156" font-family="monospace" font-size="18" fill="#9fe8ff">tool surface</text>
  </g>

  <g transform="translate(990, 560)" filter="url(#shadow)">
    <rect x="0" y="0" width="530" height="210" rx="18" fill="#11283c" stroke="#81d9ff" stroke-opacity="0.5" stroke-width="2"/>
    <text x="34" y="48" font-family="Arial" font-size="24" font-weight="bold" fill="#f4fbff">Key Question</text>
    <text x="34" y="95" font-family="Arial" font-size="28" fill="#d8f5ff">Agent 是聊天框，还是交互编排层？</text>
    <text x="34" y="144" font-family="Arial" font-size="20" fill="#9fe8ff">Strengths, risks, and the next better design</text>
  </g>

  <g stroke="#81d9ff" stroke-width="3" fill="none" opacity="0.65">
    <path d="M 580 665 L 620 665"/>
    <path d="M 950 665 L 990 665"/>
  </g>

  <g transform="translate(1420, 250)">
    <circle cx="0" cy="0" r="128" fill="none" stroke="#81d9ff" stroke-opacity="0.35" stroke-width="3"/>
    <circle cx="0" cy="0" r="88" fill="none" stroke="#81d9ff" stroke-opacity="0.25" stroke-width="2"/>
    <rect x="-46" y="-46" width="92" height="70" rx="18" fill="none" stroke="#e7f7ff" stroke-width="4"/>
    <line x1="0" y1="-46" x2="0" y2="-82" stroke="#e7f7ff" stroke-width="3"/>
    <circle cx="0" cy="-92" r="10" fill="#81d9ff"/>
    <circle cx="-20" cy="-12" r="10" fill="#81d9ff"/>
    <circle cx="20" cy="-12" r="10" fill="#81d9ff"/>
    <path d="M -20 22 Q 0 38 20 22" stroke="#e7f7ff" stroke-width="3" fill="none"/>
  </g>

  <text x="1840" y="1035" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#81d9ff" opacity="0.5" text-anchor="end">Jerret's Blog</text>
</svg>
