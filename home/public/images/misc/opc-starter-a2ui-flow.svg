<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#5b6472"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#202939">OPC-Starter A2UI 渲染链路</text>
  <text x="600" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5b6472">User -&gt; useAgentChat -&gt; SSE -&gt; Edge Function -&gt; Agent Loop -&gt; A2UI Surface</text>

  <g filter="url(#shadow)">
    <rect x="70" y="130" width="150" height="80" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
    <text x="145" y="165" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#243040">User</text>
    <text x="145" y="190" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">send message</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="120" width="190" height="100" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
    <text x="385" y="160" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#243040">useAgentChat</text>
    <text x="385" y="185" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">text / a2ui / tool</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="550" y="120" width="180" height="100" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
    <text x="640" y="160" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#243040">sseClient</text>
    <text x="640" y="185" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">event parser</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="105" width="270" height="130" rx="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
    <text x="935" y="145" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#243040">Supabase Edge Function</text>
    <text x="935" y="170" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">index.ts / sse.ts</text>
    <text x="935" y="192" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">auth + TransformStream + SSE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="300" width="270" height="160" rx="12" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
    <text x="935" y="340" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#243040">agentLoop.ts</text>
    <text x="935" y="368" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">qwen-plus + tools + stream</text>
    <text x="935" y="392" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">tool_call -&gt; processToolCall()</text>
    <text x="935" y="416" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">result appended back to LLM</text>
    <text x="935" y="440" text-anchor="middle" font-family="Arial" font-size="13" fill="#8a2d2d">Risk: server assumes tool success first</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="260" y="330" width="220" height="120" rx="12" fill="#b0e3e6" stroke="#0e8088" stroke-width="2"/>
    <text x="370" y="372" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#243040">useAgentStore</text>
    <text x="370" y="397" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">surface + dataModel</text>
    <text x="370" y="420" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">handle A2UI messages</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="530" y="330" width="200" height="120" rx="12" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
    <text x="630" y="372" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#243040">A2UIRenderer</text>
    <text x="630" y="397" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">registry + bindings</text>
    <text x="630" y="420" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">sanitize + actions</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="540" width="390" height="110" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
    <text x="495" y="580" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#243040">Rendered Surface</text>
    <text x="495" y="606" text-anchor="middle" font-family="monospace" font-size="12" fill="#425466">chat surface / portal / fullscreen</text>
    <text x="495" y="628" text-anchor="middle" font-family="Arial" font-size="13" fill="#425466">structured UI instead of raw HTML</text>
  </g>

  <g stroke="#5b6472" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M 220 170 L 290 170"/>
    <path d="M 480 170 L 550 170"/>
    <path d="M 730 170 L 800 170"/>
    <path d="M 935 235 L 935 300"/>
    <path d="M 800 380 L 730 380"/>
    <path d="M 530 390 L 480 390"/>
    <path d="M 370 450 L 370 510 Q 370 540 400 540"/>
    <path d="M 630 450 L 630 540"/>
  </g>

  <g stroke="#9673a6" stroke-width="2" fill="none" stroke-dasharray="8 6" marker-end="url(#arrow)">
    <path d="M 860 460 Q 760 560 690 590"/>
  </g>
  <text x="850" y="520" font-family="Arial" font-size="12" fill="#7b6090">a2ui / tool_call / done</text>

  <text x="1130" y="735" font-family="Arial, sans-serif" font-size="12" fill="#999999" text-anchor="end">Jerret's Blog</text>
</svg>
